<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Video Controller</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Speed & Quality</h1>
    </div>
    
    <div class="section">
      <div class="section-title">Playback Speed</div>
      <div class="options-grid" id="speed-options">
        <button class="option-btn" data-type="speed" data-value="0.5">0.5x</button>
        <button class="option-btn" data-type="speed" data-value="1.0">1.0x</button>
        <button class="option-btn" data-type="speed" data-value="1.5">1.5x</button>
        <button class="option-btn" data-type="speed" data-value="2.0">2.0x</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">YouTube Quality</div>
      <div class="options-grid" id="quality-options">
        <button class="option-btn" data-type="quality" data-value="auto">Auto</button>
        <button class="option-btn" data-type="quality" data-value="large">480p</button>
        <button class="option-btn" data-type="quality" data-value="hd720">720p</button>
        <button class="option-btn" data-type="quality" data-value="hd1080">1080p</button>
      </div>
    </div>

    <div class="footer">
      <p>Changes apply to the current session only.</p>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
